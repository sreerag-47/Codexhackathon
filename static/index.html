<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Civic Pulse Spatial Dashboard</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Outfit & Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: radial-gradient(circle at 50% 50%, #0b1329 0%, #030712 100%);
    }
    h1, h2, h3, .font-title {
      font-family: 'Outfit', sans-serif;
    }
    .map-grid {
      background-image: 
        linear-gradient(rgba(34, 211, 238, 0.05) 1px, transparent 1px), 
        linear-gradient(90deg, rgba(34, 211, 238, 0.05) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    /* Glassmorphism Styles */
    .glass-panel {
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .glass-card {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-card:hover {
      border-color: rgba(34, 211, 238, 0.3);
      box-shadow: 0 10px 30px -10px rgba(34, 211, 238, 0.15);
      transform: translateY(-2px);
    }
    .glass-card-critical {
      background: rgba(220, 38, 38, 0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(239, 68, 68, 0.15);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-card-critical:hover {
      border-color: rgba(239, 68, 68, 0.4);
      box-shadow: 0 10px 30px -10px rgba(239, 68, 68, 0.20);
      transform: translateY(-2px);
    }
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.3);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body class="min-h-screen text-slate-100 antialiased relative overflow-x-hidden">
  <!-- Ambient Background Orbs -->
  <div class="fixed top-[-10%] left-[-10%] h-[50%] w-[50%] rounded-full bg-cyan-900/10 blur-[120px] pointer-events-none"></div>
  <div class="fixed bottom-[-10%] right-[-10%] h-[50%] w-[50%] rounded-full bg-rose-900/10 blur-[120px] pointer-events-none"></div>

  <main class="grid min-h-screen grid-cols-1 lg:grid-cols-[45vw_55vw]">
    
    <!-- Left Section: Citizen Reporting & Interactive Map -->
    <section class="border-r border-slate-800/60 p-6 lg:p-8 flex flex-col justify-start">
      <div class="mb-6">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-cyan-500/10 border border-cyan-500/20 text-xs font-semibold uppercase tracking-[0.2em] text-cyan-400">
          <span class="h-1.5 w-1.5 rounded-full bg-cyan-400 animate-pulse"></span>
          Citizen Sandbox Portal
        </div>
        <h1 class="mt-3 text-4xl font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-100 to-slate-400 bg-clip-text text-transparent">
          Civic Pulse
        </h1>
        <p class="mt-2 text-sm text-slate-400 leading-relaxed">
          Speak, coordinates are mapped automatically, and submit. The spatial clustering framework automatically organizes incoming grievances.
        </p>
      </div>

      <form id="report-form" class="glass-panel space-y-4 rounded-3xl p-5 shadow-2xl relative overflow-hidden">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Reporter Phone</label>
          <input id="phone" class="w-full rounded-xl border border-slate-800/80 bg-slate-950/50 px-4 py-2.5 outline-none ring-cyan-500/50 focus:ring-2 focus:border-cyan-500 transition-all font-mono text-sm" value="+919876543210" required />
        </div>

        <div>
          <div class="flex items-center justify-between gap-3 mb-2">
            <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Live Transcript</label>
            <button id="mic" type="button" class="rounded-full bg-cyan-400 hover:bg-cyan-300 active:scale-95 px-3.5 py-1 text-xs font-bold text-slate-950 shadow-lg shadow-cyan-400/20 transition-all flex items-center gap-1.5">
              <span>🎙️</span> <span id="mic-text">Dictate</span>
            </button>
          </div>
          <textarea id="transcript" rows="3" class="w-full rounded-xl border border-slate-800/80 bg-slate-950/50 px-4 py-2.5 outline-none ring-cyan-500/50 focus:ring-2 focus:border-cyan-500 transition-all text-sm leading-relaxed" required>There is a massive pothole right outside the main gate, vehicles are swerving wildly into oncoming traffic to avoid it.</textarea>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Latitude</label>
            <input id="lat" class="mt-1.5 w-full rounded-xl border border-slate-800/80 bg-slate-950/50 px-4 py-2 text-sm font-mono" value="10.0625" />
          </div>
          <div>
            <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Longitude</label>
            <input id="lon" class="mt-1.5 w-full rounded-xl border border-slate-800/80 bg-slate-950/50 px-4 py-2 text-sm font-mono" value="76.5312" />
          </div>
        </div>

        <div class="rounded-2xl border border-slate-800 bg-slate-950/40 p-4">
          <div class="mb-2 flex justify-between text-[11px] font-bold uppercase tracking-widest text-slate-400">
            <span>Interactive SVG Grid</span>
            <span id="coord-label" class="font-mono text-cyan-400">10.0625, 76.5312</span>
          </div>
          
          <svg id="map" viewBox="0 0 500 320" class="map-grid h-64 w-full cursor-crosshair rounded-xl border border-slate-800 bg-slate-950/60 shadow-inner">
            <defs>
              <radialGradient id="hot" cx="50%" cy="50%">
                <stop offset="0%" stop-color="#ef4444"/>
                <stop offset="100%" stop-color="#7f1d1d"/>
              </radialGradient>
            </defs>
            <!-- Background path representing main road -->
            <path d="M30 245 C130 210 160 125 265 146 S390 185 465 72" fill="none" stroke="#22d3ee" stroke-width="4" stroke-linecap="round" opacity=".25"/>
            <!-- Rendered ticket cluster nodes -->
            <g id="map-nodes"></g>
            <!-- Current active placement pin -->
            <circle id="pin" cx="250" cy="160" r="7" fill="#22d3ee" stroke="white" stroke-width="2.5" class="transition-all duration-300"/>
          </svg>
        </div>

        <button id="submit-btn" type="submit" class="w-full rounded-2xl bg-gradient-to-r from-emerald-500 via-cyan-500 to-blue-500 hover:from-emerald-400 hover:to-blue-400 active:scale-[0.98] py-3.5 text-md font-bold text-slate-950 shadow-xl shadow-cyan-500/10 transition-all">
          Submit Grievance
        </button>
        <p id="status" class="text-xs text-center text-emerald-400 font-semibold min-h-[16px]"></p>
      </form>
    </section>

    <!-- Right Section: Density Matrix & Live Work Queue -->
    <section class="p-6 lg:p-8 flex flex-col justify-start bg-slate-950/20 lg:h-screen lg:overflow-y-auto">
      <div class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
          <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-rose-500/10 border border-rose-500/20 text-xs font-semibold uppercase tracking-[0.2em] text-rose-400">
            <span class="h-1.5 w-1.5 rounded-full bg-rose-400 animate-ping"></span>
            Density Matrix
          </div>
          <h2 class="mt-3 text-3xl font-extrabold tracking-tight text-white">Live Work Queue</h2>
        </div>
        <div class="flex gap-2">
          <button id="reset" class="rounded-xl border border-rose-500/30 hover:bg-rose-500/10 active:scale-95 px-4 py-2.5 text-xs font-bold text-rose-200 transition-all">Reset Demo</button>
          <button id="refresh" class="rounded-xl border border-slate-800 hover:border-slate-700 active:scale-95 bg-slate-900/60 px-4 py-2.5 text-xs font-bold text-slate-300 transition-all flex items-center gap-1.5">
            <span>🔄</span> Refresh
          </button>
        </div>
      </div>
      
      <!-- Container for Grievance Cards -->
      <div id="tickets" class="space-y-4"></div>
    </section>
  </main>

  <script>
    const latEl = document.getElementById('lat');
    const lonEl = document.getElementById('lon');
    const transcriptEl = document.getElementById('transcript');
    const statusEl = document.getElementById('status');
    const coordLabel = document.getElementById('coord-label');
    const pin = document.getElementById('pin');
    let tickets = [];

    // Conversion helper: geographic coords <--> SVG pixels
    function coordsToPixel(lat, lon) {
      return { x: ((lon - 76.5295) / 0.0034) * 500, y: 320 - ((lat - 10.0607) / 0.0030) * 320 };
    }
    function pixelToCoords(x, y) {
      return { lat: 10.0607 + ((320 - y) / 320) * 0.0030, lon: 76.5295 + (x / 500) * 0.0034 };
    }
    
    function setPinFromCoords(lat, lon) {
      const point = coordsToPixel(lat, lon);
      pin.setAttribute('cx', Math.max(0, Math.min(500, point.x)));
      pin.setAttribute('cy', Math.max(0, Math.min(320, point.y)));
      coordLabel.textContent = `${Number(lat).toFixed(4)}, ${Number(lon).toFixed(4)}`;
    }

    // Dictation functionality
    const micBtn = document.getElementById('mic');
    const micText = document.getElementById('mic-text');
    
    micBtn.addEventListener('click', () => {
      const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
      if (!SpeechRecognition) { 
        statusEl.textContent = 'Speech recognition is not available in this browser.'; 
        return; 
      }
      const recognition = new SpeechRecognition();
      recognition.continuous = false;
      
      recognition.onstart = () => {
        micText.textContent = 'Listening...';
        micBtn.classList.add('animate-pulse', 'bg-red-500', 'text-white');
        micBtn.classList.remove('bg-cyan-400', 'text-slate-950');
      };
      
      recognition.onend = () => {
        micText.textContent = 'Dictate';
        micBtn.classList.remove('animate-pulse', 'bg-red-500', 'text-white');
        micBtn.classList.add('bg-cyan-400', 'text-slate-950');
      };
      
      recognition.onresult = (event) => { 
        transcriptEl.value = event.results[0][0].transcript; 
      };
      
      recognition.onerror = () => {
        statusEl.textContent = 'Speech recognition error. Please speak clearly.';
      };
      
      recognition.start();
    });

    // Map selection click
    document.getElementById('map').addEventListener('click', (event) => {
      const rect = event.currentTarget.getBoundingClientRect();
      const x = ((event.clientX - rect.left) / rect.width) * 500;
      const y = ((event.clientY - rect.top) / rect.height) * 320;
      const coords = pixelToCoords(x, y);
      latEl.value = coords.lat.toFixed(6);
      lonEl.value = coords.lon.toFixed(6);
      setPinFromCoords(coords.lat, coords.lon);
    });

    // Fetch and sync tickets
    async function loadTickets() {
      try {
        const response = await fetch('/api/tickets');
        tickets = await response.json();
        renderTickets();
        renderMapNodes();
      } catch (err) {
        console.error('Error fetching ticket data:', err);
      }
    }

    // HTML Escaper for security
    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[char]));
    }

    // Render interactive node circles in SVG map
    function renderMapNodes() {
      const group = document.getElementById('map-nodes');
      group.innerHTML = tickets.map(ticket => {
        const p = coordsToPixel(ticket.representative_lat, ticket.representative_lon);
        const hot = ticket.active_report_count > 3;
        const color = hot ? '#ef4444' : '#f97316';
        
        return `
          <g class="cursor-pointer group" onclick="selectTicketFromMap('${ticket.ticket_id}')">
            <!-- Ripple Wave -->
            <circle class="${hot ? 'animate-ping' : 'animate-pulse'}" cx="${p.x}" cy="${p.y}" r="${12 + ticket.active_report_count * 2.5}" fill="${color}" opacity="0.18"></circle>
            <!-- Outer Ring -->
            <circle cx="${p.x}" cy="${p.y}" r="${8 + ticket.active_report_count * 2}" fill="none" stroke="${color}" stroke-width="1.5" opacity="0.5" class="transition-all duration-300 group-hover:scale-125"></circle>
            <!-- Core Bubble -->
            <circle cx="${p.x}" cy="${p.y}" r="${5 + ticket.active_report_count}" fill="url(#hot)" stroke="white" stroke-width="1.5"></circle>
            <!-- Count label -->
            <text x="${p.x}" y="${p.y + 3.5}" fill="white" font-size="10" font-weight="900" text-anchor="middle">${ticket.active_report_count}</text>
            <title>${escapeHtml(ticket.category)} - ${ticket.active_report_count} Claims</title>
          </g>
        `;
      }).join('');
    }

    // Inter-panel link: Select card when clicking map node
    window.selectTicketFromMap = function(ticketId) {
      const card = document.getElementById(`ticket-${ticketId}`);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.classList.add('ring-2', 'ring-cyan-500', 'scale-[1.01]');
        setTimeout(() => {
          card.classList.remove('ring-2', 'ring-cyan-500', 'scale-[1.01]');
        }, 1500);
      }
    };

    // Render list of grievance tickets
    function renderTickets() {
      document.getElementById('tickets').innerHTML = tickets.map(ticket => {
        const hot = ticket.active_report_count > 3;
        const safeCategory = escapeHtml(ticket.category);
        const safeTitle = escapeHtml(ticket.title);
        const safeSynthesis = escapeHtml(ticket.ai_impact_synthesis);
        const safeMemo = escapeHtml(ticket.generated_dispatch_memo);
        const safeStatus = escapeHtml(ticket.status);
        const isDispatched = ticket.status === "DISPATCHED";
        
        // Colors & Classes
        const statusBadgeColor = isDispatched ? 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30' : 'bg-amber-500/20 text-amber-400 border-amber-500/30';
        const cardClass = hot ? 'glass-card-critical' : 'glass-card';
        
        return `
          <article id="ticket-${ticket.ticket_id}" class="rounded-3xl p-5 shadow-2xl relative ${cardClass}">
            <!-- Header Grid -->
            <div class="flex items-start justify-between gap-3">
              <div>
                <div class="flex items-center gap-2">
                  <span class="text-xs font-bold uppercase tracking-wider ${hot ? 'text-rose-400' : 'text-cyan-400'}">[${safeCategory}]</span>
                  <span class="text-[10px] text-slate-500">•</span>
                  <span class="text-xs font-mono text-slate-400">${ticket.active_report_count} Claims Combined</span>
                </div>
                <h3 class="mt-2 text-xl font-bold tracking-tight text-white">${safeTitle}</h3>
              </div>
              <div class="flex flex-col items-end gap-1.5">
                <span class="rounded-full ${hot ? 'bg-rose-500 text-slate-950 font-black animate-pulse' : 'bg-cyan-500/20 text-cyan-300 font-bold'} px-3 py-1 text-xs uppercase tracking-wider">
                  ${ticket.composite_severity}
                </span>
              </div>
            </div>

            <!-- AI Synthesis Description -->
            <p class="mt-3.5 text-sm text-slate-300 leading-relaxed font-light">${safeSynthesis}</p>
            
            <!-- Coordinates & Status -->
            <div class="mt-4 flex flex-wrap items-center gap-x-4 gap-y-2 text-xs font-mono text-slate-400">
              <span class="bg-slate-900/60 px-2.5 py-1 rounded-md border border-slate-800">LAT: ${ticket.representative_lat.toFixed(4)}</span>
              <span class="bg-slate-900/60 px-2.5 py-1 rounded-md border border-slate-800">LON: ${ticket.representative_lon.toFixed(4)}</span>
              <span class="px-2.5 py-0.5 rounded-full border ${statusBadgeColor} font-bold">${safeStatus}</span>
            </div>

            <!-- Action Area / Dispatch Memo -->
            <div class="mt-5 pt-4 border-t border-slate-800/40">
              ${isDispatched 
                ? `<div class="overflow-hidden rounded-xl border border-slate-800 bg-slate-950/80 shadow-inner">
                    <div class="flex items-center justify-between bg-slate-900/50 px-4 py-2 border-b border-slate-800">
                      <span class="text-[10px] font-mono tracking-wider text-emerald-400 uppercase font-bold flex items-center gap-1">
                        <span class="h-1.5 w-1.5 rounded-full bg-emerald-400"></span> Official Memo (Dispatched)
                      </span>
                    </div>
                    <pre class="p-4 font-mono text-[11px] leading-relaxed text-slate-300 whitespace-pre-wrap">${safeMemo}</pre>
                   </div>`
                : `<div class="flex flex-col gap-3">
                    <button data-dispatch="${ticket.ticket_id}" class="w-full sm:w-auto rounded-xl bg-white hover:bg-slate-100 active:scale-95 px-4 py-2 text-xs font-extrabold text-slate-950 shadow-md shadow-white/5 transition-all self-start">
                      Generate Dispatch Memo
                    </button>
                    ${safeMemo !== "PENDING_APPROVAL" 
                      ? `<pre class="whitespace-pre-wrap rounded-xl bg-slate-950/70 p-3 text-xs text-slate-400 border border-slate-800">${safeMemo}</pre>` 
                      : ''}
                   </div>`
              }
            </div>
          </article>
        `;
      }).join('');

      // Wire up dispatch buttons dynamically
      document.querySelectorAll('[data-dispatch]').forEach(button => button.addEventListener('click', async () => {
        const originalText = button.innerHTML;
        button.disabled = true;
        button.innerHTML = `
          <span class="inline-flex items-center gap-1.5">
            <svg class="animate-spin h-3 w-3 text-slate-950" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Generating Memo...
          </span>
        `;
        button.classList.add('opacity-75', 'cursor-not-allowed');

        try {
          await fetch(`/api/tickets/${button.dataset.dispatch}/dispatch`, { method: 'POST' });
          await loadTickets();
        } catch (err) {
          console.error(err);
        } finally {
          button.disabled = false;
          button.innerHTML = originalText;
          button.classList.remove('opacity-75', 'cursor-not-allowed');
        }
      }));
    }

    // Submit report form handler
    document.getElementById('report-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const submitBtn = document.getElementById('submit-btn');
      const originalText = submitBtn.innerHTML;
      
      submitBtn.disabled = true;
      submitBtn.innerHTML = `
        <span class="inline-flex items-center gap-2">
          <svg class="animate-spin h-5 w-5 text-slate-950" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Analyzing Location & Text...
        </span>
      `;
      submitBtn.classList.add('opacity-75', 'cursor-not-allowed');

      try {
        const response = await fetch('/api/grievances/submit', {
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            reporter_phone: document.getElementById('phone').value, 
            transcript_text: transcriptEl.value, 
            latitude: Number(latEl.value), 
            longitude: Number(lonEl.value) 
          })
        });
        const ticket = await response.json();
        statusEl.textContent = `Cluster ${ticket.ticket_id} updated successfully (${ticket.active_report_count} claims total).`;
        await loadTickets();
      } catch (err) {
        statusEl.textContent = 'Failed to submit grievance. Please try again.';
        console.error(err);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
        submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
      }
    });

    // Reset demo state
    document.getElementById('reset').addEventListener('click', async () => {
      try {
        await fetch('/api/demo/reset', { method: 'POST' });
        statusEl.textContent = 'Demo reset to golden cluster state.';
        await loadTickets();
      } catch (err) {
        console.error('Error resetting demo:', err);
      }
    });

    // Manual Refresh
    document.getElementById('refresh').addEventListener('click', loadTickets);

    // Initial setup
    setPinFromCoords(Number(latEl.value), Number(lonEl.value));
    loadTickets();
  </script>
</body>
</html>
